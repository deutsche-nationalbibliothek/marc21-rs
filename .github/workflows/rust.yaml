name: Rust

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '00 02 * * *'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: ubuntu-latest, toolchain: stable, triple: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, toolchain: stable, triple: x86_64-unknown-linux-musl }
          - { os: ubuntu-latest, toolchain: beta, triple: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, toolchain: nightly, triple: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, toolchain: "1.93", triple: x86_64-unknown-linux-gnu }
          - { os: windows-latest, toolchain: stable, triple: x86_64-pc-windows-msvc }
          - { os: windows-latest, toolchain: stable, triple: i686-pc-windows-msvc }
          - { os: macos-latest, toolchain: stable, triple: x86_64-apple-darwin }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: ${{ matrix.target.toolchain }}
          targets: ${{ matrix.target.triple }}
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: nextest
      - name: Run tests
        if: ${{ matrix.target.toolchain != 'nightly' }}
        run: |
          cargo nextest run --target ${{ matrix.target.triple }} --workspace -F performant,serde,build --no-fail-fast
          cargo test --target ${{ matrix.target.triple }} --doc --workspace -F performant,serde,build --no-fail-fast
      - name: Run tests (nightly)
        if: ${{ matrix.target.toolchain == 'nightly' }}
        run: |
          cargo nextest run --target ${{ matrix.target.triple }} --workspace --all-features --no-fail-fast
          cargo test --target ${{ matrix.target.triple }} --doc --workspace --all-features --no-fail-fast

  fuzz:
    if: ${{ github.event_name == 'push' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 900
    strategy:
      matrix:
        item:
          - { target: record-matcher, max-total-time: 180 }
          - { target: byte-record, max-total-time: 180 }
          - { target: query, max-total-time: 180 }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: nightly
      - uses: dtolnay/install@97c306b4fb754e1dbe18619415cf4a90ae0aa6a2 # master
        with:
          crate: cargo-fuzz
      - run: |
          cargo fuzz run --jobs 2 ${{ matrix.item.target }} -- -max_total_time=${{ matrix.item.max-total-time }}

  clippy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: nightly
          components: clippy
      - run: |
          cargo clippy --workspace --all-features

  rustfmt:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: nightly
          components: rustfmt
      - run: |
          cargo fmt --all --check

  features:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: nightly
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: cargo-hack
      - name: "Check Powerset"
        run: |
          cargo hack check --workspace --features performant,nightly --no-dev-deps --ignore-unknown-features
      - name: "Test Powerset"
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          cargo hack check --workspace --features performant,nightly --ignore-unknown-features

  miri:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: nightly
          components: miri
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: nextest
      - run: |
          cargo miri nextest run --workspace --all-features --lib

  careful:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: nightly
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: nextest
      - run: cargo install cargo-careful
      - run: |
          cargo careful test --workspace --all-features --doc
          cargo careful nextest run --workspace

  ci:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - careful
      - clippy
      - features
      - fuzz
      - miri
      - rustfmt
      - test
    steps:
      - name: Check for cancelled jobs
        if: ${{ contains(needs.*.result, 'cancelled') }}
        run: |
          exit 1
      - name: Check for failed jobs
        if: ${{ contains(needs.*.result, 'failure') }}
        run: |
          exit 1
      - name: Finish job
        run: |
          exit 0
